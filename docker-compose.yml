services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - LICENSEDESK_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/license_desk
      - LICENSEDESK_REDIS_URL=redis://redis:6379/0
      - LICENSEDESK_S3_ENABLED=true
      - LICENSEDESK_S3_ENDPOINT_URL=http://minio:9000
      - LICENSEDESK_S3_ACCESS_KEY=minioadmin
      - LICENSEDESK_S3_SECRET_KEY=minioadmin
      - LICENSEDESK_S3_BUCKET=licensedesk
      - LICENSEDESK_S3_PUBLIC_URL=http://localhost:9000/licensedesk
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: license_desk
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - LICENSEDESK_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/license_desk
      - LICENSEDESK_REDIS_URL=redis://redis:6379/0
      - LICENSEDESK_S3_ENABLED=true
      - LICENSEDESK_S3_ENDPOINT_URL=http://minio:9000
      - LICENSEDESK_S3_ACCESS_KEY=minioadmin
      - LICENSEDESK_S3_SECRET_KEY=minioadmin
      - LICENSEDESK_S3_BUCKET=licensedesk
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - LICENSEDESK_DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/license_desk
      - LICENSEDESK_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/licensedesk;
      mc anonymous set download local/licensedesk;
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      - postgres
    profiles:
      - keycloak

volumes:
  postgres_data:
  minio_data:
